name: Agent Dispatch

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read

concurrency:
  group: agent-dispatch-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch agent
    runs-on: ubuntu-latest
    environment: agent
    if: >-
      (github.event_name == 'issues' && github.event.label.name == 'agent:task') ||
      (github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
      contains(github.event.comment.body, '@claude') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association))
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity
        run: |
          git config user.name "belastrijkdom-bot[bot]"
          git config user.email "${{ secrets.BOT_APP_ID }}+belastrijkdom-bot[bot]@users.noreply.github.com"

      - name: Set task prompt
        id: task
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            {
              echo 'prompt<<EOF_PROMPT'
              echo "Read AGENTS.md in full before taking any action."
              echo ""
              echo "Implement the task described in issue #${{ github.event.issue.number }}."
              echo ""
              echo "1. Create branch agent/issue-${{ github.event.issue.number }}"
              echo "2. Make the minimal change that satisfies the issue"
              echo "3. Run the full validation loop:"
              echo "     npm run build && npm test && npm run test:schema &&"
              echo "     npm run test:e2e && npm run lint &&"
              echo "     npm audit --audit-level=critical --omit=dev"
              echo "4. Fix any failures before proceeding — never suppress a check"
              echo "5. Open a PR: gh pr create referencing \"Closes #${{ github.event.issue.number }}\""
              echo 'EOF_PROMPT'
            } >> "$GITHUB_OUTPUT"
          else
            echo "prompt=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude agent
        uses: anthropics/claude-code-action@a92e7c70a4da9793dc164451d829089dc057a464
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: ${{ steps.task.outputs.prompt }}
          claude_args: '--allowedTools "Bash(*),Edit,Write,WebFetch"'
          show_full_output: 'true'

      - name: Post agent cost comment
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          OUTPUT_FILE="/home/runner/work/_temp/claude-execution-output.json"
          [ -f "$OUTPUT_FILE" ] || { echo "No execution output found"; exit 0; }

          RESULT=$(jq 'if type == "array" then map(select(.type == "result")) | last else . end' "$OUTPUT_FILE")
          TURNS=$(echo "$RESULT" | jq -r '.num_turns // 0')
          COST=$(echo "$RESULT" | jq -r '.total_cost_usd // 0' | xargs printf "%.2f")
          MS=$(echo "$RESULT" | jq -r '.duration_ms // 0')
          MINS=$(( MS / 60000 ))
          SECS=$(( (MS % 60000) / 1000 ))

          ISSUE="${{ github.event.issue.number || github.event.pull_request.number }}"
          [ -n "$ISSUE" ] || { echo "No issue number found"; exit 0; }

          BODY=$(printf '<!-- agent-cost -->\n**Agent run** · dispatch · %s turns · $%s · %sm %ss' "$TURNS" "$COST" "$MINS" "$SECS")
          gh issue comment "$ISSUE" --repo "${{ github.repository }}" --body "$BODY"
