name: Agent Self-Correct

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches:
      - 'agent/**'

permissions:
  contents: read

concurrency:
  group: agent-self-correct-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  self-correct:
    name: Self-correct CI failure
    runs-on: ubuntu-latest
    environment: agent
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2
        with:
          egress-policy: audit

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Fetch CI failure log
        id: ci-log
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          gh run view ${{ github.event.workflow_run.id }} --log-failed 2>&1 | head -300 > /tmp/ci-failure.log
          EOF_DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "log<<${EOF_DELIM}"
            cat /tmp/ci-failure.log
            echo "${EOF_DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout failing branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity
        run: |
          git config user.name "belastrijkdom-bot[bot]"
          git config user.email "${{ secrets.BOT_APP_ID }}+belastrijkdom-bot[bot]@users.noreply.github.com"

      - name: Run Claude self-correction
        uses: anthropics/claude-code-action@a92e7c70a4da9793dc164451d829089dc057a464
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          prompt: |
            Read AGENTS.md in full before taking any action.

            CI failed on branch ${{ github.event.workflow_run.head_branch }}. Failure output:
            ---
            ${{ steps.ci-log.outputs.log }}
            ---

            Fix the root cause. Do not suppress the check. Push the fix to the same branch
            (${{ github.event.workflow_run.head_branch }}). Do not open a new PR — one already exists.
          claude_args: '--allowedTools "Bash(*),Edit,Write"'
          show_full_output: 'true'

      - name: Post agent cost comment
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          OUTPUT_FILE="/home/runner/work/_temp/claude-execution-output.json"
          [ -f "$OUTPUT_FILE" ] || { echo "No execution output found"; exit 0; }

          RESULT=$(jq 'if type == "array" then map(select(.type == "result")) | last else . end' "$OUTPUT_FILE")
          TURNS=$(echo "$RESULT" | jq -r '.num_turns // 0')
          COST=$(echo "$RESULT" | jq -r '.total_cost_usd // 0' | xargs printf "%.2f")
          MS=$(echo "$RESULT" | jq -r '.duration_ms // 0')
          MINS=$(( MS / 60000 ))
          SECS=$(( (MS % 60000) / 1000 ))

          BRANCH="${{ github.event.workflow_run.head_branch }}"
          ISSUE=$(echo "$BRANCH" | grep -oE '[0-9]+$')
          [ -n "$ISSUE" ] || { echo "No issue number found in branch name"; exit 0; }

          BODY=$(printf '<!-- agent-cost -->\n**Agent run** · self-correct · %s turns · $%s · %sm %ss' "$TURNS" "$COST" "$MINS" "$SECS")
          gh issue comment "$ISSUE" --repo "${{ github.repository }}" --body "$BODY"
